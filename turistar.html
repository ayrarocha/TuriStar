<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☆ TuriStar ☆</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }
        .fundo-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(2px);
            object-fit: cover;
        }
        header {
            position: relative;
            z-index: 1;
            background-color: #6c3c0c;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            width: 100%; 
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            color: #fff;
            background-color: #333;
            border-radius: 8px;
            margin: 0 9px;
        }
        nav ul li a:hover {
            background-color: #333;
            color: #fff;
        }
        .container {
            display: flex;
            justify-content: space-between; 
            width: 100%;
            max-width: 1200px; 
            margin: 20px auto; 
            padding: 0 20px; 
            box-sizing: border-box; 
        }
        .coluna {
            flex: 1; 
            padding: 20px;
            background-color: rgba(108, 60, 12, 0.8);
            border-radius: 10px;
            margin-top: 20px;
            color: #fff;
        }
        .coluna-esquerda {
            order: 1; 
        }
        .coluna-direita {
            order: 3; 
        }
        .contato {
            text-align: center;
            padding: 50px 0;
            clear: both;
        }
        .contato img {
            max-width: 100%;
            max-height: 600px;
            display: block;
            margin: 0 auto;
        }
        .mapa-destinos {
            height: 50px;
            border-radius: 10px;
            margin: 10px;
            text-align: left;
        }
        .botao-google-maps {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4285f4;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin: 0;
        }
        .botao-google-maps:hover {
            background-color: #3367d6;
        }
        .lugares {
            max-width: 100%;
            height: auto;
            margin: 0;
        }
        .gastronomia-comida {
        height: 50px;
        border-radius: 10px;
        margin: 10px;
        text-align: right;
        }
        .comida {
            max-width: 100%;
            height: auto;
            margin: 0;
        }
        section h2,
        section p {
            color: #fff;
        }
